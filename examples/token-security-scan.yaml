name: token-security-scan
version: "1.0"
description: Security scan of AIXBT project tokens using GoPlus
steps:
  - id: projects
    action: projects
    params:
      chain: ethereum
      limit: 5
      hasToken: "true"
  - id: security
    foreach: "projects.data"
    action: token-security
    source: goplus
    params:
      chain_id: "1"
      contract_addresses: "{item.address}"
hints:
  combine:
    - projects
    - security
  key: address
analysis:
  task: Identify projects with security risks
  instructions: Flag any tokens with honeypot risk, high tax, or proxy contracts
